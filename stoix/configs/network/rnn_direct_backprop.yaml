# ---Recurrent (GRU) Direct Backprop Networks---
# The actor is a GRU-based recurrent network. The critic is feed-forward so
# that the recurrent-vs-memoryless ablation isolates the actor's memory.
actor_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [128]
    use_layer_norm: True
    activation: tanh
  rnn_layer:
    _target_: stoix.networks.base.ScannedRNN
    cell_type: gru
    hidden_state_dim: 128
  post_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [128]
    use_layer_norm: True
    activation: tanh
  action_head:
    _target_: stoix.networks.heads.DeterministicHead
  post_processor:
    _target_: stoix.networks.postprocessors.ScalePostProcessor

critic_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256, 256]
    use_layer_norm: True
    activation: tanh
  critic_head:
    _target_: stoix.networks.heads.ScalarCriticHead
