# ---MLP Direct Backprop Networks---
# Uses tanh activations and layer norm for gradient stability
# when backpropagating through long dynamics chains.
actor_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256, 256]
    use_layer_norm: True
    activation: tanh
  action_head:
    _target_: stoix.networks.heads.DeterministicHead
  post_processor:
    _target_: stoix.networks.postprocessors.ScalePostProcessor

critic_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256, 256]
    use_layer_norm: True
    activation: tanh
  critic_head:
    _target_: stoix.networks.heads.ScalarCriticHead
