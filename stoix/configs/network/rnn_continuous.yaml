# ---Recurrent Structure Networks for Continuous PPO ---
# GRU-based actor + critic with a tanh-squashed Normal action head for continuous
# (box) action spaces such as Brax HalfCheetah. Hidden size 256 throughout to
# match the larger continuous-control networks.

actor_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256]
    use_layer_norm: False
    activation: silu
  rnn_layer:
    _target_: stoix.networks.base.ScannedRNN
    cell_type: gru
    hidden_state_dim: 256
  post_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256]
    use_layer_norm: False
    activation: silu
  action_head:
    _target_: stoix.networks.heads.NormalAffineTanhDistributionHead

critic_network:
  pre_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256]
    use_layer_norm: False
    activation: silu
  rnn_layer:
    _target_: stoix.networks.base.ScannedRNN
    cell_type: gru
    hidden_state_dim: 256
  post_torso:
    _target_: stoix.networks.torso.MLPTorso
    layer_sizes: [256]
    use_layer_norm: False
    activation: silu
  critic_head:
    _target_: stoix.networks.heads.ScalarCriticHead
