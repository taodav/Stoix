# --- Defaults REC-Direct-Backprop ---
system_name: rec_direct_backprop

# --- RL Hyperparameters ---
actor_lr: 1e-4
rollout_length: 32
gamma: 0.99
max_grad_norm: 1.0
decay_learning_rates: False
exploration_noise: 0.1
reward_scale: 1.0
normalize_observations: False

# --- Ablation control ---
# False -> fully recurrent GRU policy (memory persists across the rollout).
# True  -> hidden state zeroed every step (memoryless), same architecture/params.
reset_hidden_state_every_step: False

# --- Optional SHAC-style terminal value bootstrap (NOT base Direct Backprop) ---
# False -> pure Direct Backprop: no critic is built or trained.
# True  -> add a learned feed-forward critic V(s_H) as a differentiable terminal
#          value to account for the return beyond the truncated rollout horizon.
use_terminal_value: False
critic_lr: 3e-4
