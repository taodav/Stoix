# --- Defaults FF-Direct-Backprop ---
system_name: ff_direct_backprop

# --- RL Hyperparameters ---
actor_lr: 1e-4
critic_lr: 3e-4
rollout_length: 32
gamma: 0.99
max_grad_norm: 1.0
decay_learning_rates: False
exploration_noise: 0.1
use_terminal_value: True
reward_scale: 1.0
normalize_observations: False
